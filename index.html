<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>たなばたリトミック セット</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#fff6cf,#dff7ff,#ffe5f0);
  color:#16305c;
  text-align:center;
}
#menu{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:24px;
  box-sizing:border-box;
}
.card{
  background:white;
  width:92%;
  max-width:560px;
  border-radius:30px;
  padding:26px;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
}
h1{font-size:30px;line-height:1.4}
button{
  font-size:23px;
  padding:16px 28px;
  margin:10px;
  border:none;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
}
.normalBtn{background:#ff7aa8;color:white;width:86%;max-width:430px}
.careBtn{background:#80d96b;color:#16305c;width:86%;max-width:430px}
.small{font-size:15px;line-height:1.6;color:#555}
</style>
</head>
<body>

<div id="menu">
  <div class="card">
    <h1>🎋 たなばたリトミック セット</h1>
    <h1>どちらで あそびますか？</h1>

    <button class="normalBtn" onclick="location.href='normal.html'">
      🎵 つうじょうばん<br>
      <span style="font-size:17px">みんなで たのしく りとみっく</span>
    </button>

    <button class="careBtn" onclick="location.href='care.html'">
      🌱 はいりょばん<br>
      <span style="font-size:17px">じぶんの ぺーすで たのしめる</span>
    </button>

    <p class="small">
      かめらを きょかしてね。<br>
      Vercelなど https のURLで ひらいてね。
    </p>
  </div>
</div>

</body>
</html>
