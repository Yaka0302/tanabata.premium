<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>たなばたリトミック｜特性のある子向け</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#10224f;
  color:white;
  text-align:center;
  overflow:hidden;
}
#video{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
  opacity:.14;
}
#passwordScreen{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#10224f;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:14px;
  padding:20px;
  box-sizing:border-box;
}
#passwordInput{
  font-size:22px;
  padding:14px;
  border-radius:12px;
  border:3px solid #ffe58a;
  width:80%;
  max-width:340px;
}
#passwordError{
  color:#ffe58a;
  font-weight:bold;
}
#game{
  display:block;
  position:relative;
  z-index:2;
  min-height:100vh;
  padding:16px;
  box-sizing:border-box;
  background:linear-gradient(rgba(10,28,70,.82),rgba(35,70,140,.88));
}
h1{font-size:25px;margin:8px}
#count,#score{font-size:20px;margin:5px}
#illust{font-size:72px;margin:12px}
#title{
  font-size:28px;
  font-weight:bold;
  background:#ffe58a;
  color:#10224f;
  border-radius:22px;
  padding:10px;
  max-width:650px;
  margin:10px auto;
}
#msg{
  font-size:23px;
  line-height:1.65;
  background:rgba(255,255,255,.20);
  border-radius:24px;
  padding:16px;
  margin:10px auto;
  max-width:650px;
}
#schedule{
  background:white;
  color:#10224f;
  border-radius:22px;
  padding:12px;
  margin:10px auto;
  max-width:650px;
  font-size:20px;
  font-weight:bold;
  line-height:1.6;
}
#judge{
  font-size:25px;
  font-weight:bold;
  color:#ffe58a;
  margin-top:12px;
  line-height:1.5;
}
button{
  font-size:21px;
  padding:13px 24px;
  border:none;
  border-radius:999px;
  background:#ffe58a;
  color:#10224f;
  font-weight:bold;
  margin:7px;
}
button:focus{
  outline:5px solid white;
  outline-offset:4px;
}
.choice{
  display:block;
  margin:10px auto;
  padding:14px;
  width:85%;
  max-width:420px;
  border-radius:20px;
  background:white;
  color:#10224f;
  font-size:22px;
  font-weight:bold;
  border:3px solid #ffe58a;
}
.starGame{
  position:relative;
  height:245px;
  margin-top:10px;
}
.gameStar{
  position:absolute;
  font-size:56px;
}
#calmBox{
  display:none;
  background:#fff7cf;
  color:#10224f;
  border-radius:24px;
  padding:18px;
  margin:14px auto;
  max-width:620px;
  font-size:24px;
  line-height:1.6;
  font-weight:bold;
}
#progressWrap{
  width:88%;
  max-width:620px;
  height:26px;
  background:rgba(255,255,255,.28);
  border-radius:999px;
  margin:10px auto;
  overflow:hidden;
  border:2px solid rgba(255,255,255,.7);
}
#progressBar{
  height:100%;
  width:0%;
  background:#ffe58a;
  border-radius:999px;
  transition:width .3s ease;
}
#modeLabel{
  display:inline-block;
  background:rgba(255,255,255,.22);
  border:2px solid rgba(255,255,255,.55);
  border-radius:999px;
  padding:8px 14px;
  font-weight:bold;
  margin:4px;
}
.smallNote{
  font-size:18px;
  color:#fff4b8;
  line-height:1.4;
}
</style>
</head>

<body>
<video id="video" autoplay playsinline muted></video>

<div id="game">
  <h1>🎋 たなばたリトミック 🎵</h1>
  <div id="modeLabel">🌱 ゆっくり・やさしいモード</div>
  <div class="smallNote">つらくなったら「おやすみ」ボタンを押してね</div>

  <div id="count">1 / 8</div>
  <div id="score">⭐ 0</div>

  <div id="progressWrap"><div id="progressBar"></div></div>

  <div id="illust">🎋✨</div>
  <div id="title"></div>
  <div id="msg"></div>
  <div id="schedule"></div>
  <div id="calmBox">🌙 おやすみ中<br>深呼吸してね<br>もう大丈夫になったら「もどる」を押してね</div>
  <div id="area"></div>
  <div id="judge">スタートを おしてね</div>
  <div id="cameraError" style="color:#ffe58a;font-size:18px;font-weight:bold;line-height:1.5;margin:8px auto;max-width:620px"></div>

  <button onclick="startGame()">スタート</button>
  <button onclick="toggleMusic()">BGM 小さめ</button>
  <button onclick="showBreak()">おやすみ</button>
  <button onclick="hideBreak()">もどる</button>
  <button onclick="skipStage()">むずかしいから つぎへ</button>
</div>

<script>
/*
 特性のある子向けアレンジ
 ・見通しカード
 ・急な画面変化を少なく
 ・BGMは小さめ、オンオフ可能
 ・判定はやさしめ
 ・休憩ボタンあり
 ・失敗表示なし
 ・「むずかしいから つぎへ」で成功体験を守る
*/

const PASSWORD="7Tb@Rit!2026#Home";

const stages=[
{title:"きらきらたいそう",illust:"✨🙌✨",msg:"おててを うえに あげよう。<br>できるところまでで だいじょうぶ♪",schedule:"やること：おててを あげる → ひろげる → ポーズ",action:"kirakira",target:3,bgm:[523,659,784,659]},
{title:"なかよし あいさつ",illust:"👦👧💛",msg:"こんにちはの うごきを しよう。<br>ゆっくりで いいよ♪",schedule:"やること：てをあげる → おねがいポーズ → ひろげる",action:"friend",target:3,bgm:[392,440,494,523]},
{title:"あいにいこう",illust:"🌌👘",msg:"そのばで ゆっくり あるこう。<br>少しだけでも OK！",schedule:"やること：足ぶみ 3かい",action:"walk",target:3,bgm:[523,587,659,523]},
{title:"ほしを あつめよう",illust:"⭐⭐⭐",msg:"ほしを 5こ タッチしよう。<br>あせらなくて だいじょうぶ♪",schedule:"やること：星を 5こ タッチ",action:"starGame",target:5,bgm:[784,880,988,880]},
{title:"おねがいごと",illust:"🎋💛",msg:"すきな たんざくを えらぼう。",schedule:"やること：すきなボタンを 1つえらぶ",action:"wish",target:1,bgm:[392,523,659,523]},
{title:"あまのがわ",illust:"🌌🌟",msg:"りょうてを ひろげよう。<br>止まっていても OK！",schedule:"やること：りょうてを ひろげる 5かい",action:"balance",target:5,bgm:[349,440,523,440]},
{title:"きらきら ダンス",illust:"⭐🎵",msg:"りょうてを あげて ダンス。<br>すわって やっても OK！",schedule:"やること：りょうてを あげる 4かい",action:"danceSlow",target:4,bgm:[659,784,880,784]},
{title:"ゴール",illust:"🎉🌟🎋",msg:"よくできました。<br>できるところまで がんばったね♪",schedule:"おしまいです。",action:"finish",target:1,bgm:[523,659,784,1046]}
];

let index=0,score=0,progress=0,musicOn=false,musicTimer=null,bgmStep=0,cameraStarted=false,paused=false;
let lastAction=0,stageCleared=false,starsCollected=0;
let lastLeftAnkleY=null,lastRightAnkleY=null;
let holdStart=null;
const AudioContext=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;

function piano(freq=600,dur=.25){
 if(!audioCtx || !musicOn || paused)return;
 const o=audioCtx.createOscillator(),g=audioCtx.createGain();
 o.frequency.value=freq;
 o.type="triangle";
 g.gain.setValueAtTime(.055,audioCtx.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
 o.connect(g);
 g.connect(audioCtx.destination);
 o.start();
 o.stop(audioCtx.currentTime+dur);
}

function successSound(){
 piano(523,.12);
 setTimeout(()=>piano(659,.12),100);
}

function clearSound(){
 piano(523,.12);
 setTimeout(()=>piano(659,.12),120);
 setTimeout(()=>piano(784,.16),240);
}

function startStageBgm(){
 if(musicTimer)clearInterval(musicTimer);
 bgmStep=0;
 musicTimer=setInterval(()=>{
   if(!musicOn || paused)return;
   const melody=stages[index].bgm;
   piano(melody[bgmStep%melody.length],.32);
   bgmStep++;
 },700);
}

function toggleMusic(){
 if(!audioCtx)audioCtx=new AudioContext();
 musicOn=!musicOn;
 document.getElementById("modeLabel").textContent=musicOn ? "🌱 BGM小さめ・やさしいモード" : "🌱 音なし・やさしいモード";
 if(musicOn)startStageBgm();
}

function updateProgress(){
 const s=stages[index];
 const p=Math.min(100,Math.round((progress/s.target)*100));
 document.getElementById("progressBar").style.width=p+"%";
 document.getElementById("judge").textContent=`できた ${progress} / ${s.target}`;
}

function startGame(){
 if(!audioCtx)audioCtx=new AudioContext();
 musicOn=false;
 paused=false;
 if(!cameraStarted){
   startCamera();
 }
 showStage();
 document.getElementById("judge").textContent="ゆっくり はじめよう♪";
}

function showStage(){
 paused=false;
 document.getElementById("calmBox").style.display="none";
 progress=0;
 stageCleared=false;
 holdStart=null;
 lastLeftAnkleY=null;
 lastRightAnkleY=null;

 const s=stages[index];
 document.getElementById("count").textContent=`${index+1} / ${stages.length}`;
 document.getElementById("score").textContent=`⭐ ${score}`;
 document.getElementById("illust").textContent=s.illust;
 document.getElementById("title").textContent=s.title;
 document.getElementById("msg").innerHTML=s.msg;
 document.getElementById("schedule").textContent=s.schedule;
 document.getElementById("area").innerHTML="";
 document.getElementById("progressBar").style.width="0%";
 document.getElementById("judge").textContent="やってみよう♪";

 if(s.action==="starGame")startStarGame();
 if(s.action==="wish")showWish();
 if(s.action==="finish"){
   document.getElementById("judge").textContent=`よくできたね！ ⭐${score}こ`;
   document.getElementById("progressBar").style.width="100%";
   clearSound();
 }
 startStageBgm();
}

function addProgress(){
 if(stageCleared || paused)return;
 const s=stages[index];
 progress++;
 successSound();
 updateProgress();
 if(progress>=s.target){
   clearStage();
 }
}

function clearStage(){
 if(stageCleared)return;
 stageCleared=true;
 score++;
 document.getElementById("score").textContent=`⭐ ${score}`;
 document.getElementById("judge").textContent="できたね！ つぎへ すすむよ♪";
 document.getElementById("progressBar").style.width="100%";
 clearSound();
 setTimeout(nextStage,2200);
}

function nextStage(){
 index++;
 if(index>=stages.length){
   index=stages.length-1;
 }
 showStage();
}

function skipStage(){
 if(stages[index].action==="finish")return;
 document.getElementById("judge").textContent="ここまでで OK！ つぎへ すすむよ♪";
 clearSound();
 setTimeout(nextStage,900);
}

function showBreak(){
 paused=true;
 document.getElementById("calmBox").style.display="block";
 document.getElementById("judge").textContent="おやすみ中。だいじょうぶだよ。";
}

function hideBreak(){
 paused=false;
 document.getElementById("calmBox").style.display="none";
 document.getElementById("judge").textContent="もどったよ。ゆっくりで OK♪";
}

function startStarGame(){
 starsCollected=0;
 document.getElementById("area").innerHTML=`<div class="starGame" id="starGame"></div>`;
 document.getElementById("judge").textContent="ほしを タッチしよう 0 / 5";
 createStar();
}

function createStar(){
 const box=document.getElementById("starGame");
 if(!box)return;
 box.innerHTML="";
 const star=document.createElement("div");
 star.textContent="⭐";
 star.className="gameStar";
 star.style.left=(Math.random()*80+6)+"%";
 star.style.top=(Math.random()*68+8)+"%";
 star.onclick=collectStar;
 box.appendChild(star);
}

function collectStar(){
 if(paused)return;
 starsCollected++;
 progress=starsCollected;
 document.getElementById("judge").textContent=`ほし ${starsCollected} / 5`;
 updateProgress();
 successSound();
 if(starsCollected>=5){
   clearStage();
 }else{
   createStar();
 }
}

function showWish(){
 document.getElementById("area").innerHTML=`
 <button class="choice" onclick="chooseWish('げんきに すごせますように')">💛 げんきに すごしたい</button>
 <button class="choice" onclick="chooseWish('たのしく あそべますように')">🩷 たのしく あそびたい</button>
 <button class="choice" onclick="chooseWish('にこにこ すごせますように')">💚 にこにこ すごしたい</button>
 <button class="choice" onclick="chooseWish('すきなことを たのしめますように')">💙 すきなことを たのしみたい</button>`;
 document.getElementById("judge").textContent="すきな たんざくを えらんでね";
}

function chooseWish(text){
 if(paused || stageCleared)return;
 document.getElementById("area").innerHTML=`<h2>🎋 ${text} 🎋</h2>`;
 clearStage();
}

function onPoseResults(results){
 if(paused || stageCleared || !results.poseLandmarks)return;
 const lm=results.poseLandmarks;
 const lw=lm[15],rw=lm[16],ls=lm[11],rs=lm[12];
 const lh=lm[23],rh=lm[24],la=lm[27],ra=lm[28];
 const action=stages[index].action;
 const now=Date.now();

 if(action==="kirakira" || action==="danceSlow"){
   const bothHandsUp=lw.y<ls.y+0.03 && rw.y<rs.y+0.03;
   if(bothHandsUp && now-lastAction>1300){
     lastAction=now;
     addProgress();
   }
 }

 if(action==="friend"){
   const handMove=(lw.y<ls.y+0.04)||(rw.y<rs.y+0.04)||Math.abs(lw.x-rw.x)<0.28;
   if(handMove && now-lastAction>1300){
     lastAction=now;
     addProgress();
   }
 }

 if(action==="walk"){
   if(lastLeftAnkleY!==null && lastRightAnkleY!==null){
     const leftMove=Math.abs(la.y-lastLeftAnkleY);
     const rightMove=Math.abs(ra.y-lastRightAnkleY);
     if((leftMove>0.015||rightMove>0.015)&&now-lastAction>1200){
       lastAction=now;
       addProgress();
     }
   }
   lastLeftAnkleY=la.y;
   lastRightAnkleY=ra.y;
 }

 if(action==="balance"){
   const open=Math.abs(lw.x-rw.x)>.32 && lw.y<lh.y+0.08 && rw.y<rh.y+0.08;
   if(open && now-lastAction>1300){
     lastAction=now;
     addProgress();
   }
 }
}

function startCamera(){
 const video=document.getElementById("video");
 const err=document.getElementById("cameraError");

 if(err){
   err.textContent="カメラを起動しています。許可画面が出たら「許可」を押してください。";
 }

 try{
   const pose=new Pose({
     locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
   });

   pose.setOptions({
     modelComplexity:0,
     smoothLandmarks:true,
     minDetectionConfidence:.45,
     minTrackingConfidence:.45
   });

   pose.onResults(onPoseResults);

   const camera=new Camera(video,{
     onFrame:async()=>{
       await pose.send({image:video});
     },
     width:640,
     height:480
   });

   camera.start()
   .then(()=>{
     cameraStarted=true;
     if(err)err.textContent="カメラ起動OKです。";
   })
   .catch(e=>{
     console.error(e);
     cameraStarted=false;
     if(err){
       err.innerHTML="カメラが起動できませんでした。<br>ブラウザのカメラ許可をONにして、httpsのURLで開いてください。";
     }
   });

 }catch(e){
   console.error(e);
   cameraStarted=false;
   if(err){
     err.innerHTML="カメラが起動できませんでした。<br>ブラウザのカメラ許可をONにして、httpsのURLで開いてください。";
   }
 }
}

function checkPassword(){
 const pass=document.getElementById("passwordInput").value;
 if(pass===PASSWORD){
   document.getElementById("passwordScreen").style.display="none";
   document.getElementById("game").style.display="block";
   showStage();
 }else{
   document.getElementById("passwordError").textContent="パスワードがちがいます";
 }
}

showStage();
</script>
</body>
</html>
